<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALKARANTA — Alma & Orden</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream: #F7F5F0; --olive: #4A5C28; --olive-light: #6B7F45; --gold: #C9A84C; --gold-light: #E2C97E; --wood: #8B6347; --dark: #1C1C1A; --mid: #5A5A52; --border: rgba(201,168,76,0.25); }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--dark); font-size: 15px; line-height: 1.6; }
  
  /* FLOTANTE INSPIRACIÓN */
  @keyframes flotar { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
  .flotante-izq { animation: flotar 3s ease-in-out infinite; position: fixed; top: 20px; left: 20px; z-index: 9999; padding: 15px; background: white; border: 1px solid #eee; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 250px; text-align: center; }

  /* NAV, HERO, ETC (Estilos mantenidos de tu versión) */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 48px; background: rgba(247,245,240,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; letter-spacing: 3px; color: var(--olive); text-decoration: none; }
  .nav-logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mid); text-decoration: none; transition: color .2s; }
  .nav-links a:hover { color: var(--gold); }
  #hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 24px 80px; }
  .hero-cta { display: inline-block; padding: 14px 40px; border: 1px solid var(--olive); color: var(--olive); text-decoration: none; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; transition: all .3s; }
  .hero-cta:hover { background: var(--olive); color: var(--cream); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(28,28,26,0.85); z-index: 10000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--cream); width: min(820px, 95vw); max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
</style>
</head>
<body>

<!-- RECUADRO FLOTANTE -->
<div class="flotante-izq">
  <h4 style="margin: 0 0 10px 0;">Inspiración ALKARANTA</h4>
  <p id="frase-inspiradora" style="font-style: italic; font-size: 0.9em; min-height: 40px; margin: 0 0 10px 0;">Haz clic para recibir un pensamiento.</p>
  <button onclick="mostrarFrase()" style="cursor: pointer; background-color: #E2C97E; border: none; border-radius: 5px; font-weight: bold; padding: 5px 10px;">Generar</button>
</div>

<!-- NAV -->
<nav>
  <a href="#hero" class="nav-logo">ALKAR<span>ANTA</span></a>
  <ul class="nav-links">
    <li><a href="#hero">Inicio</a></li>
    <li><button onclick="openAdmin()" style="background:none; border:none; cursor:pointer; font-size:12px; text-transform:uppercase;">Admin</button></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero">
  <h1>ALKARANTA</h1>
  <p>Alma & Orden</p>
  <a href="#contacto" class="hero-cta">Comenzar</a>
</section>

<!-- MODAL ADMIN -->
<div id="admin-modal" class="modal-overlay">
  <div class="modal">
    <div style="padding: 20px; border-bottom: 1px solid #ccc;">
      <button onclick="closeAdmin()" style="float:right">Cerrar</button>
      <h3>Panel de Administración</h3>
    </div>
    <div style="padding: 20px;">
      <input type="text" id="adm-eyebrow" placeholder="Subtítulo">
      <textarea id="adm-hero-desc" placeholder="Descripción"></textarea>
      <button onclick="saveContent()">Guardar cambios</button>
    </div>
  </div>
</div>

<script>
  function mostrarFrase() {
    const frases = ["El orden externo es un reflejo de tu paz interna.", "La verdadera filosofía holística comienza escuchando al silencio.", "Cada pequeño cambio consciente transforma tu realidad.", "Tu hogar es tu templo: trátalo con intención.", "Alma y Orden: el equilibrio perfecto entre sentir y hacer."];
    document.getElementById("frase-inspiradora").innerText = frases[Math.floor(Math.random() * frases.length)];
  }

  function openAdmin() { document.getElementById('admin-modal').classList.add('open'); }
  function closeAdmin() { document.getElementById('admin-modal').classList.remove('open'); }

  function saveContent() {
    const c = {
        eyebrow: document.getElementById('adm-eyebrow').value,
        heroDesc: document.getElementById('adm-hero-desc').value
    };
    localStorage.setItem('content', JSON.stringify(c));
    alert('Cambios guardados');
  }
</script>
</body>
</html>
