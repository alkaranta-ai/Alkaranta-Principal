<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALKARANTA — Alma & Orden</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream: #F7F5F0; --olive: #4A5C28; --gold: #C9A84C; --dark: #1C1C1A; --mid: #5A5A52; --border: rgba(201,168,76,0.25); }
  body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--dark); line-height: 1.6; }
  nav { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--olive); text-decoration: none; }
  #hero { text-align: center; padding: 80px 20px; }
  .hero-logo-wrap img { width: 150px; height: 150px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 20px; }
  section { padding: 60px 20px; max-width: 1000px; margin: auto; }
  .founders-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  .founder-card { padding: 30px; border: 1px solid var(--border); }
  .whatsapp-btn-flotante { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 20px; border-radius: 50px; z-index: 9999; text-decoration: none; }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">ALKARANTA</a>
</nav>

<section id="hero">
  <div class="hero-logo-wrap"><img src="Logo.jpg" alt="Logo"></div>

  <p>Alma & Orden</p>
</section>

<section id="nosotros">
  <h2>Andrea & Mauricio</h2>
  <div class="founders-grid">
    <div class="founder-card">
      <h3>Mauricio</h3>
      <p>Coach Ontológico · Consultor Empresarial</p>
    </div>
    <div class="founder-card">
      <h3>Andrea</h3>
      <p>Cosmiatra Holística · Terapeuta</p>
    </div>
  </div>
</section>

<a href="https://wa.me/5493489557172" class="whatsapp-btn-flotante">💬 WhatsApp</a>

</body>
</html>
